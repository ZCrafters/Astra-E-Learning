# Astra E-Learning - CI/CD Pipeline
# Workflow untuk build dan deploy aplikasi Next.js

name: Build and Deploy

# Trigger: Jalankan saat push ke branch main atau pull request
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Environment variables yang digunakan di seluruh workflow
env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # JOB 1: Build dan Test
  # ==========================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout kode dari repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci --include=optional
      
      # Step 4: Create .env.local file from secrets
      # Secrets diambil dari GitHub Settings → Secrets → Actions
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_APP_NAME=Astra E-Learning" >> .env.local
          echo "NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://localhost:3000' }}" >> .env.local
      
      # Step 5: Run linter
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
      
      # Step 6: Build aplikasi Next.js
      - name: Build Next.js app
        run: npm run build
        env:
          # Environment variables untuk build time
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      
      # Step 7: Upload build artifact (untuk deploy)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next/
            package.json
            package-lock.json
            public/
          retention-days: 7

  # ==========================================
  # JOB 2: Deploy ke Vercel (Production)
  # ==========================================
  deploy-vercel:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      
      # Deploy ke Vercel (Production)
      - name: Deploy to Vercel Production
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Skipping Vercel deployment - VERCEL_TOKEN secret is not configured"
          else
            vercel --prod --token="$VERCEL_TOKEN"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

